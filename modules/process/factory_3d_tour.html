<!DOCTYPE html>
<html lang="hu" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Virtuális Bejárás - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/main.css">
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; }

        #ui {
            position: absolute;
            top: 90px;
            left: 20px;
            color: white;
            background: rgba(15, 23, 42, 0.92);
            padding: 1.2rem 1.5rem;
            border-radius: 14px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            font-family: 'Inter', sans-serif;
            min-width: 220px;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.5s, visibility 0.5s;
            text-align: center;
            padding: 20px;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid rgba(255,255,255,0.85);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        .hint-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 1.8rem;
            background: rgba(255,255,255,0.05);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hint-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .hint-key {
            background: #f8fafc; color: #0f172a;
            padding: 3px 7px; border-radius: 5px;
            font-weight: 800; font-family: monospace;
            font-size: 0.78rem; box-shadow: 0 3px 0 #cbd5e1;
            white-space: nowrap;
        }

        canvas { display: block; }

        #minimap {
            position: absolute;
            bottom: 28px;
            right: 28px;
            width: 170px;
            height: 170px;
            background: rgba(15,23,42,0.88);
            border: 2px solid rgba(59,130,246,0.6);
            border-radius: 50%;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0,0,0,0.5);
        }
        #minimap canvas { width: 100%; height: 100%; }

        #perf {
            position: absolute;
            top: 90px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
            font-size: 0.75rem;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>

<body class="module-body">

    <div id="overlay">
        <div style="background: rgba(15,23,42,0.97); padding: 40px 60px; border-radius: 24px; border: 1px solid rgba(59,130,246,0.5); box-shadow: 0 20px 50px rgba(0,0,0,0.7); max-width: 580px;">
            <i class="fas fa-industry" style="font-size: 4rem; color: #3b82f6; margin-bottom: 1.2rem; filter: drop-shadow(0 0 12px rgba(59,130,246,0.6));"></i>
            <h1 style="font-family: 'Outfit'; font-weight: 800; font-size: 2.4rem; margin: 0 0 0.4rem 0; color: #fff;">ELEC OKOSGYÁR BEJÁRÁS</h1>
            <p style="color: #94a3b8; font-size: 1.05rem; margin-bottom: 1.8rem; line-height: 1.6;">3D virtuális séta a fonyódi SMT gyárban.</p>
            <button id="enterBtn" style="padding: 14px 32px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: none; border-radius: 12px; color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; box-shadow: 0 6px 20px rgba(29,78,216,0.4); text-transform: uppercase; letter-spacing: 1px;">
                Belépés a szimulációba
            </button>
            <div class="hint-grid">
                <div class="hint-item"><span class="hint-key">W A S D</span> <span style="color:#cbd5e1;">Mozgás</span></div>
                <div class="hint-item"><span class="hint-key">EGÉR</span> <span style="color:#cbd5e1;">Körülnézés</span></div>
                <div class="hint-item"><span class="hint-key">SHIFT</span> <span style="color:#cbd5e1;">Futás</span></div>
                <div class="hint-item"><span class="hint-key">ESC</span> <span style="color:#cbd5e1;">Kilépés</span></div>
            </div>
        </div>
    </div>

    <div id="ui">
        <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #60a5fa; font-weight: 700;">Helyszín</div>
        <div id="location" style="font-size: 1.3rem; font-weight: 800; margin-top: 2px; color: #fff;">Udvar</div>
        <hr style="border:0; border-top:1px solid rgba(59,130,246,0.3); margin:0.7rem 0;">
        <div style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #60a5fa; font-weight: 700;">Megtett Távolság</div>
        <div style="font-size: 1.1rem; font-weight: 800; margin-top: 2px; color: #fff;"><span id="distance">0.0</span> m</div>
        <hr style="border:0; border-top:1px solid rgba(59,130,246,0.3); margin:0.7rem 0;">
        <div style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Energia</div>
        <div style="font-size: 0.72rem; margin-top: 4px; color: #cbd5e1; display:flex; flex-direction:column; gap:3px;">
            <div style="display:flex; justify-content:space-between;"><span>PV:</span><span style="color:#10b981; font-weight:700;">340 kW</span></div>
            <div style="display:flex; justify-content:space-between;"><span>Fogyasztás:</span><span style="color:#60a5fa; font-weight:700;">185 kW</span></div>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="minimap"><canvas id="mm"></canvas></div>
    <div id="perf">FPS: <span id="fps">--</span></div>

    <script type="importmap">
        {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // ─── RENDERER ────────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.BasicShadowMap; // fastest shadow type
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        document.body.appendChild(renderer.domElement);

        // ─── SCENE ───────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xbfdbfe);
        scene.fog = new THREE.Fog(0xbfdbfe, 60, 160);

        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 300);

        // ─── CONTROLS ────────────────────────────────────────────────────────
        const controls = new PointerLockControls(camera, document.body);
        const overlay  = document.getElementById('overlay');
        document.getElementById('enterBtn').addEventListener('click', () => controls.lock());
        overlay.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => { overlay.style.opacity = '0'; setTimeout(() => overlay.style.visibility = 'hidden', 500); });
        controls.addEventListener('unlock', () => { overlay.style.visibility = 'visible'; setTimeout(() => overlay.style.opacity = '1', 10); });

        // ─── INPUT ───────────────────────────────────────────────────────────
        let fwd=false, bwd=false, lft=false, rgt=false, run=false;
        const vel = new THREE.Vector3(), dir = new THREE.Vector3();
        let totalDist = 0, prevPos = new THREE.Vector3();
        let headBobTime = 0, headBobY = 0;

        document.addEventListener('keydown', e => {
            if (e.code==='KeyW') fwd=true;
            if (e.code==='KeyS') bwd=true;
            if (e.code==='KeyA') lft=true;
            if (e.code==='KeyD') rgt=true;
            if (e.code==='ShiftLeft') run=true;
        });
        document.addEventListener('keyup', e => {
            if (e.code==='KeyW') fwd=false;
            if (e.code==='KeyS') bwd=false;
            if (e.code==='KeyA') lft=false;
            if (e.code==='KeyD') rgt=false;
            if (e.code==='ShiftLeft') run=false;
        });

        // ─── PROCEDURAL TEXTURES ────────────────────────────────────────────
        function makeFloorTex() {
            const c = document.createElement('canvas'); c.width=512; c.height=512;
            const ctx = c.getContext('2d');
            ctx.fillStyle='#1a2540'; ctx.fillRect(0,0,512,512);
            ctx.strokeStyle='#0f172a'; ctx.lineWidth=6;
            for(let i=0;i<=512;i+=64){ ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke(); }
            ctx.strokeStyle='rgba(59,130,246,0.25)'; ctx.lineWidth=1;
            for(let i=32;i<512;i+=64){ ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke(); }
            return new THREE.CanvasTexture(c);
        }
        function makeWallTex() {
            const c = document.createElement('canvas'); c.width=512; c.height=256;
            const ctx = c.getContext('2d');
            ctx.fillStyle='#d5c9b5'; ctx.fillRect(0,0,512,256);
            ctx.strokeStyle='#c0b4a0'; ctx.lineWidth=2;
            for(let x=0;x<=512;x+=64){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,256);ctx.stroke(); }
            for(let y=0;y<=256;y+=64){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(512,y);ctx.stroke(); }
            return new THREE.CanvasTexture(c);
        }
        function makeSmtTex() {
            const c = document.createElement('canvas'); c.width=256; c.height=256;
            const ctx = c.getContext('2d');
            ctx.fillStyle='#c8d4df'; ctx.fillRect(0,0,256,256);
            ctx.fillStyle='#060f1e'; ctx.fillRect(20,60,216,90);
            ctx.fillStyle='#0ea5e9'; ctx.fillRect(24,64,208,82);
            ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(24,64,208,82);
            ctx.fillStyle='#00ff88'; ctx.font='bold 11px monospace'; ctx.fillText('STATUS: RUNNING',30,100);
            ctx.fillStyle='#eab308'; ctx.font='10px monospace'; ctx.fillText('PCB COUNT: 2847',30,118);
            ctx.fillStyle='#c8d4df'; ctx.fillRect(20,180,50,30); // green btn
            ctx.fillStyle='#10b981'; ctx.fillRect(24,184,42,22);
            ctx.fillStyle='#ef4444'; ctx.beginPath();ctx.arc(120,195,12,0,Math.PI*2);ctx.fill(); // e-stop
            // warning stripe bottom
            for(let i=0;i<256;i+=30){
                ctx.fillStyle='#eab308'; ctx.beginPath();ctx.moveTo(i,240);ctx.lineTo(i+15,240);ctx.lineTo(i+30,256);ctx.lineTo(i+15,256);ctx.closePath();ctx.fill();
                ctx.fillStyle='#0f172a'; ctx.beginPath();ctx.moveTo(i+15,240);ctx.lineTo(i+30,240);ctx.lineTo(i+45,256);ctx.lineTo(i+30,256);ctx.closePath();ctx.fill();
            }
            return new THREE.CanvasTexture(c);
        }

        const floorTex = makeFloorTex();
        floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
        floorTex.repeat.set(10, 4);
        const wallTex = makeWallTex();
        wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
        wallTex.repeat.set(6, 2);
        const smtTex2 = makeSmtTex();

        // ─── LIGHTING ────────────────────────────────────────────────────────
        scene.add(new THREE.HemisphereLight(0xc8dff8, 0x4a5568, 0.9));
        const sun = new THREE.DirectionalLight(0xfffdf4, 1.5);
        sun.position.set(40, 80, 40);
        sun.castShadow = true;
        sun.shadow.mapSize.set(512, 512);
        sun.shadow.camera.left=-80; sun.shadow.camera.right=80;
        sun.shadow.camera.top=80;  sun.shadow.camera.bottom=-80;
        sun.shadow.camera.far=250; sun.shadow.bias=-0.001;
        scene.add(sun);

        // Interior accent lights: warm white overhead + cyan strip at SMT zone + blue at office
        const intLights = [];
        [[-30,0,0x00e5ff,1.8],[-10,0,0xfff8e7,2.2],[10,0,0xfff8e7,2.2],[30,0,0x4fc3f7,1.8]].forEach(([x,,color,int]) => {
            const pl = new THREE.PointLight(color, int, 32, 1.2);
            pl.position.set(x, 8.5, 0);
            intLights.push(pl);
            scene.add(pl);
        });
        // Green safety-exit accent at lobby
        const lobbyLight = new THREE.PointLight(0x00ff7f, 1.2, 18, 2);
        lobbyLight.position.set(0, 4, 12);
        scene.add(lobbyLight);

        // ─── SHARED MATERIALS ────────────────────────────────────────────────
        const MAT = {
            floor:    new THREE.MeshLambertMaterial({ map: floorTex }),
            wall:     new THREE.MeshLambertMaterial({ map: wallTex }),
            roof:     new THREE.MeshLambertMaterial({ color: 0x4a5568 }),
            glass:    new THREE.MeshLambertMaterial({ color: 0x93c5fd, transparent:true, opacity:0.32 }),
            metal:    new THREE.MeshLambertMaterial({ color: 0x374151 }),
            concrete: new THREE.MeshLambertMaterial({ color: 0x9ca3af }),
            smt:      new THREE.MeshLambertMaterial({ map: smtTex2 }),
            desk:     new THREE.MeshLambertMaterial({ color: 0xdde1e7 }),
            grass:    new THREE.MeshLambertMaterial({ color: 0x166534 }),
            asphalt:  new THREE.MeshLambertMaterial({ color: 0x374151 }),
            yellow:   new THREE.MeshLambertMaterial({ color: 0xeab308 }),
            white:    new THREE.MeshLambertMaterial({ color: 0xf8fafc }),
            blue:     new THREE.MeshLambertMaterial({ color: 0x2563eb }),
            skin:     new THREE.MeshLambertMaterial({ color: 0xfed7aa }),
            dark:     new THREE.MeshLambertMaterial({ color: 0x1e293b }),
            shoes:    new THREE.MeshLambertMaterial({ color: 0x0f172a }),
            helmetY:  new THREE.MeshLambertMaterial({ color: 0xfbbf24 }),
            helmetW:  new THREE.MeshLambertMaterial({ color: 0xf1f5f9 }),
            hair1:    new THREE.MeshLambertMaterial({ color: 0x1c1917 }),
            hair2:    new THREE.MeshLambertMaterial({ color: 0x92400e }),
            pants1:   new THREE.MeshLambertMaterial({ color: 0x374151 }),
            pants2:   new THREE.MeshLambertMaterial({ color: 0x44403c }),
            solar:    new THREE.MeshLambertMaterial({ color: 0x1e3a5f }),
            screen:   new THREE.MeshLambertMaterial({ color: 0x0ea5e9 }),
            green:    new THREE.MeshLambertMaterial({ color: 0x10b981 }),
            red:      new THREE.MeshLambertMaterial({ color: 0xef4444 }),
        };

        // ─── COLLISION BOXES (AABB list) ──────────────────────────────────────
        // Each entry: { x1, x2, z1, z2 } – player is blocked if inside
        const colliders = [];
        function addCollider(cx, cz, halfW, halfD) {
            colliders.push({ x1: cx-halfW, x2: cx+halfW, z1: cz-halfD, z2: cz+halfD });
        }

        // ─── HELPER: box mesh ─────────────────────────────────────────────────
        function box(w, h, d, mat, px, py, pz, shadow=false) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            m.position.set(px, py, pz);
            if (shadow) { m.castShadow = true; m.receiveShadow = true; }
            scene.add(m);
            return m;
        }

        // ─── GROUND ──────────────────────────────────────────────────────────
        // Small world: ~160m × 120m total
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 160), MAT.asphalt);
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

        // Grass strips around
        const gL = new THREE.Mesh(new THREE.PlaneGeometry(30, 160), MAT.grass);
        gL.rotation.x = -Math.PI/2; gL.position.set(-115, 0.01, 0); scene.add(gL);
        const gR = new THREE.Mesh(new THREE.PlaneGeometry(30, 160), MAT.grass);
        gR.rotation.x = -Math.PI/2; gR.position.set(115, 0.01, 0); scene.add(gR);
        const gB = new THREE.Mesh(new THREE.PlaneGeometry(200, 30), MAT.grass);
        gB.rotation.x = -Math.PI/2; gB.position.set(0, 0.01, -85); scene.add(gB);

        // ─── MAIN BUILDING ───────────────────────────────────────────────────
        // Size: 80×10.5×20, centered at (0, 5.25, 0)
        // Front wall: Z=+10, Back wall: Z=-10, Left: X=-40, Right: X=+40
        // ENTRANCE: 5m wide opening at X=[-2.5..+2.5], front wall

        const BW = 80, BD = 20, BH = 10.5;
        // Front wall: two halves with gap in center (entrance at X=[-2.5..2.5])
        box(37.5, BH, 0.6, MAT.wall, -21.25, BH/2, 10,  true); // left half
        box(37.5, BH, 0.6, MAT.wall,  21.25, BH/2, 10,  true); // right half
        // Back wall
        box(BW, BH, 0.6, MAT.wall, 0, BH/2, -10, true);
        // Side walls with door on RIGHT side (X=+40) at Z=[-2..+2]
        box(0.6, BH, 8, MAT.wall, -40, BH/2, 0, true); // left side (solid)
        box(0.6, BH, 7, MAT.wall, 40, BH/2, 5.5, true); // right side top part
        box(0.6, BH, 7, MAT.wall, 40, BH/2, -5.5, true); // right side bottom part
        // Roof
        box(BW+1, 0.5, BD+1, MAT.roof, 0, BH+0.25, 0);
        // Parapet
        box(BW+1, 0.8, BD+1, MAT.concrete, 0, BH+0.65, 0);
        // Interior floor (raised slightly above ground)
        const iFloor = new THREE.Mesh(new THREE.PlaneGeometry(BW-1, BD-1), MAT.floor);
        iFloor.rotation.x = -Math.PI/2; iFloor.position.set(0, 0.05, 0); iFloor.receiveShadow=true; scene.add(iFloor);

        // Building collider: block player from walking through walls
        // We model 4 wall sections (not the entrance openings)
        addCollider(-21.25, 10, 37.5/2, 0.8);  // front-left wall
        addCollider( 21.25, 10, 37.5/2, 0.8);  // front-right wall
        addCollider(0, -10, BW/2, 0.8);         // back wall
        addCollider(-40, 0, 0.8, BD/2);         // left side wall
        addCollider(40, 5.5, 0.8, 7/2);         // right side top
        addCollider(40, -5.5, 0.8, 7/2);        // right side bottom

        // Glass lobby / entrance canopy
        const lobbyGlass = new THREE.Mesh(new THREE.BoxGeometry(5, BH, 2.5), MAT.glass);
        lobbyGlass.position.set(0, BH/2, 11.25); scene.add(lobbyGlass);
        box(16, 0.4, 4, MAT.concrete, 0, BH+0.2, 12); // canopy
        // Door frame (visual only)
        box(0.3, BH, 0.3, MAT.metal, -2.5, BH/2, 10);
        box(0.3, BH, 0.3, MAT.metal,  2.5, BH/2, 10);

        // Windows: front (flanking entrance)
        const winMat = MAT.glass;
        for (let i = 0; i < 4; i++) {
            const wx = -38 + i * 10;
            const m = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 0.2), winMat);
            m.position.set(wx, 4, 10.3); scene.add(m);
        }
        for (let i = 0; i < 4; i++) {
            const wx = 6 + i * 10;
            const m = new THREE.Mesh(new THREE.BoxGeometry(6, 3, 0.2), winMat);
            m.position.set(wx, 4, 10.3); scene.add(m);
        }
        // Windows back
        for (let i = 0; i < 8; i++) {
            const wx = -38 + i * 11;
            const m = new THREE.Mesh(new THREE.BoxGeometry(7, 3, 0.2), winMat);
            m.position.set(wx, 4, -10.3); scene.add(m);
        }

        // HVAC units on roof
        [[-25,-3],[-12,3],[5,-4],[18,2]].forEach(([hx,hz]) => {
            box(6,2,4, MAT.metal, hx, BH+1.5, hz, true);
        });

        // Yellow safety line on floor near entrance
        const yl = new THREE.Mesh(new THREE.PlaneGeometry(5, 0.25), MAT.yellow);
        yl.rotation.x = -Math.PI/2; yl.position.set(0, 0.06, 9.5); scene.add(yl);

        // ─── INTERIOR: SMT PRODUCTION LINES (Left: X=-40..-5) ────────────────
        // 2 lines at Z=-5 and Z=+5
        const smtPositions = [
            {z: -5, xStart: -38, count: 4},
            {z:  5, xStart: -38, count: 4},
        ];

        smtPositions.forEach(({z, xStart, count}) => {
            // Conveyor rail
            box(count*9, 0.5, 0.9, MAT.metal, xStart + (count*9)/2 - 9/2, 0.6, z);
            for (let i = 0; i < count; i++) {
                const x = xStart + i * 9;
                // SMT machine body
                box(5, 3.5, 2.8, MAT.smt, x, 1.85, z, true);
                // Stacklight pole
                box(0.08, 1.2, 0.08, MAT.metal, x+2.2, 3.9, z-1.2);
                // Stacklight glow (green = running, red = one fault)
                const slColor = (z < 0 && i === 2) ? MAT.red : MAT.green;
                box(0.2, 0.35, 0.2, slColor, x+2.2, 4.55, z-1.2);
                // Screen
                box(1.2, 0.7, 0.1, MAT.screen, x, 2.8, z-1.41);
                // AABB collider for this machine
                addCollider(x, z, 2.8, 1.6);
            }
            // Safety yellow line beside line
            const yl2 = new THREE.Mesh(new THREE.PlaneGeometry(count*9, 0.2), MAT.yellow);
            yl2.rotation.x = -Math.PI/2;
            yl2.position.set(xStart + (count*9)/2 - 9/2, 0.06, z + (z<0 ? 2 : -2));
            scene.add(yl2);
        });

        // Robot arm at end of each SMT line
        [-5, 5].forEach(z => {
            const base = box(0.7, 1.0, 0.7, MAT.metal, -3, 0.5, z, true);
            const arm1 = box(0.25, 1.6, 0.25, MAT.metal, -3, 1.8, z, true);
            addCollider(-3, z, 0.6, 0.6);
        });

        // ─── INTERIOR: STORAGE RACKS (Center: X=-2..+8) ──────────────────────
        const boxColors = [0x1d4ed8, 0xd97706, 0x059669, 0xdc2626, 0x7c3aed];
        for (let row = 0; row < 2; row++) {

        // ─── MINECRAFT WORKERS ───────────────────────────────────────────────

        const W_GEOMS = {

        function makeWorker(coatIsWhite, hasHelmet, yellowHelmet) {
            const g = new THREE.Group();
            const coatM = coatIsWhite ? MAT.white : MAT.blue;
            const pantM = coatIsWhite ? MAT.pants1 : MAT.pants2;
            const hairM = Math.random()>.5 ? MAT.hair1 : MAT.hair2;

            // Torso
            const torso = new THREE.Mesh(W_GEOMS.torso, coatM);
            torso.position.y = 1.41; g.add(torso);

            // Head group

            hg.position.y = 1.82;
            const head = new THREE.Mesh(W_GEOMS.head, MAT.skin);
            head.position.y = 0.26; hg.add(head);
            // hair
            const hair = new THREE.Mesh(W_GEOMS.hair, hairM);
            hair.position.set(0, 0.47, -0.01); hg.add(hair);
            // eyes
            const eL = new THREE.Mesh(W_GEOMS.eye, MAT.dark);
            eL.position.set(-0.13, 0.31, 0.27); hg.add(eL);
            const eR = new THREE.Mesh(W_GEOMS.eye, MAT.dark);
            eR.position.set(0.13, 0.31, 0.27); hg.add(eR);
            // helmet
            if (hasHelmet) {
                const hm = yellowHelmet ? MAT.helmetY : MAT.helmetW;
                const cap = new THREE.Mesh(W_GEOMS.helmet, hm);
                cap.position.set(0, 0.51, 0); hg.add(cap);
                const brim = new THREE.Mesh(W_GEOMS.brim, hm);
                brim.position.set(0, 0.44, 0.05); hg.add(brim);
            }
            g.add(hg);

            // Left leg
            const llg = new THREE.Group(); llg.position.set(-0.14, 1.0, 0);
            const ll = new THREE.Mesh(W_GEOMS.leg, pantM); ll.position.y = -0.5; llg.add(ll);
            const ls = new THREE.Mesh(W_GEOMS.shoe, MAT.shoes); ls.position.set(0,-0.93,0.03); llg.add(ls);
            g.add(llg);

            // Right leg
            const rlg = new THREE.Group(); rlg.position.set(0.14, 1.0, 0);
            const rl = new THREE.Mesh(W_GEOMS.leg, pantM); rl.position.y = -0.5; rlg.add(rl);
            const rs = new THREE.Mesh(W_GEOMS.shoe, MAT.shoes); rs.position.set(0,-0.93,0.03); rlg.add(rs);
            g.add(rlg);

            // Left arm
            const lag = new THREE.Group(); lag.position.set(-0.4, 1.72, 0);
            const la = new THREE.Mesh(W_GEOMS.arm, coatM); la.position.y = -0.44; lag.add(la);
            const lh = new THREE.Mesh(W_GEOMS.hand, MAT.skin); lh.position.y = -0.93; lag.add(lh);
            g.add(lag);

            const rag = new THREE.Group(); rag.position.set(0.4, 1.72, 0);

            const rh = new THREE.Mesh(W_GEOMS.hand, MAT.skin); rh.position.y = -0.93; rag.add(rh);

            scene.add(g);
            return { group: g, head: hg, ll: llg, rl: rlg, la: lag, ra: rag };
        }

        // Valid worker spawn / walk area (inside main building)
        function workerValidPos(x, z) {
            // Must be roughly inside building
            if (x < -38 || x > 38 || z < -9 || z > 9) return false;
            // Not through machines
            for (const c of colliders) {
                if (x > c.x1+0.5 && x < c.x2-0.5 && z > c.z1+0.5 && z < c.z2-0.5) return false;
            }
            return true;
        }

        function randWorkerTarget() {
            for (let t = 0; t < 80; t++) {
                const x = (Math.random()-0.5)*72;
                const z = (Math.random()-0.5)*17;
                if (workerValidPos(x, z)) return new THREE.Vector3(x, 0, z);
            }
            return new THREE.Vector3(0, 0, 0);
        }

        const workers = [];
        const WORKER_CONFIGS = [
            [true,  true,  true],
            [true,  false, false],
            [false, true,  false],
            [false, true,  true],
            [true,  true,  false],
            [false, false, false],
            [true,  false, false],
            [false, true,  true],
        ];

        WORKER_CONFIGS.forEach(([white, helmet, yellow], i) => {
            const mdl = makeWorker(white, helmet, yellow);
            const sp = randWorkerTarget();
            mdl.group.position.set(sp.x, 0, sp.z);
            workers.push({
                ...mdl,
                white,
                state: 'idle',
                target: new THREE.Vector3(),
                speed: 1.1 + Math.random() * 0.7,
                wait: Math.random() * 3,
                t: Math.random() * 200,
            });

        // ─── SPAWN POSITION ───────────────────────────────────────────────────
        camera.position.set(0, 1.75, 16);
        camera.lookAt(0, 1.75, 10);
        prevPos.copy(camera.position);

        // ─── COLLISION DETECTION ──────────────────────────────────────────────
        const PLAYER_R = 0.35; // player radius

        function hitCollider(x, z) {
            for (const c of colliders) {
                if (x + PLAYER_R > c.x1 && x - PLAYER_R < c.x2 &&
                    z + PLAYER_R > c.z1 && z - PLAYER_R < c.z2) {
                    return true;
                }
            }
            return false;
        }

        function isOutOfBounds(x, z) {
            // World boundary
            if (x < -100 || x > 100 || z < -80 || z > 80) return true;
            return false;
        }

        // ─── MINIMAP ──────────────────────────────────────────────────────────
        const mmCanvas = document.getElementById('mm');
        const mmCtx = mmCanvas.getContext('2d');
        mmCanvas.width = 170; mmCanvas.height = 170;
        let lastMM = 0;

        function drawMM() {
            mmCtx.clearRect(0, 0, 170, 170);
            // background circle
            mmCtx.fillStyle = '#0f172a';
            mmCtx.beginPath(); mmCtx.arc(85,85,85,0,Math.PI*2); mmCtx.fill();

            const scale = 1.2;
            const px = camera.position.x, pz = camera.position.z;
            function world2mm(wx, wz) {
                return [85 + (wx-px)*scale, 85 + (wz-pz)*scale];
            }
            function mmRect(wx,wz,w,d,fill,stroke) {
                const [cx,cy] = world2mm(wx,wz);
                const sw=w*scale, sd=d*scale;
                mmCtx.fillStyle = fill;
                mmCtx.fillRect(cx-sw/2, cy-sd/2, sw, sd);
                if (stroke) {
                    mmCtx.strokeStyle=stroke; mmCtx.lineWidth=1;
                    mmCtx.strokeRect(cx-sw/2, cy-sd/2, sw, sd);
                }
            }

            // Buildings
            mmRect(0, 0, BW, BD, 'rgba(59,130,246,0.2)', '#3b82f6');
            mmRect(AB.x, AB.z, AB.w, AB.d, 'rgba(208,198,184,0.3)', '#d0c6b8');
            // Parking
            mmRect(-58, -14, 14, 100, 'rgba(71,85,105,0.3)', 'rgba(71,85,105,0.6)');

            // Workers
            workers.forEach(w => {
                const [cx,cy] = world2mm(w.group.position.x, w.group.position.z);
                const dx=cx-85, dy=cy-85;
                if (dx*dx+dy*dy < 82*82) {
                    mmCtx.fillStyle = w.white ? '#f8fafc' : '#3b82f6';
                    mmCtx.beginPath(); mmCtx.arc(cx,cy,3,0,Math.PI*2); mmCtx.fill();
                    mmCtx.strokeStyle='#020617'; mmCtx.lineWidth=0.5; mmCtx.stroke();
                }
            });

            // View direction cone
            const look = new THREE.Vector3();
            camera.getWorldDirection(look);
            mmCtx.strokeStyle = 'rgba(239,68,68,0.4)';
            mmCtx.lineWidth = 12; mmCtx.lineCap = 'round';
            mmCtx.beginPath(); mmCtx.moveTo(85,85);
            mmCtx.lineTo(85+look.x*22, 85+look.z*22); mmCtx.stroke();

            // Player dot
            mmCtx.fillStyle = '#ef4444';
            mmCtx.beginPath(); mmCtx.arc(85,85,5,0,Math.PI*2); mmCtx.fill();
            mmCtx.strokeStyle='#fff'; mmCtx.lineWidth=1.5; mmCtx.stroke();
        }

        // ─── ANIMATION LOOP ───────────────────────────────────────────────────
        const clock = new THREE.Clock();
        let frameCount = 0, fpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.08);
            const now = performance.now();

            // FPS counter
            frameCount++;
            fpsTime += dt;
            if (fpsTime > 0.5) {
                document.getElementById('fps').textContent = Math.round(frameCount / fpsTime);
                frameCount = 0; fpsTime = 0;
            }

            // ── PLAYER MOVEMENT ──────────────────────────────────────────────
            const isMoving = fwd || bwd || lft || rgt;
            if (controls.isLocked) {
                vel.x -= vel.x * 7.0 * dt;
                vel.z -= vel.z * 7.0 * dt;

                dir.z = Number(fwd) - Number(bwd);
                dir.x = Number(rgt) - Number(lft);
                dir.normalize();

                const spd = run ? 280 : 120;
                if (fwd || bwd) vel.z -= dir.z * spd * dt;
                if (lft || rgt) vel.x -= dir.x * spd * dt;

                // X movement with wall-sliding
                const px0 = camera.position.clone();
                controls.moveRight(-vel.x * dt);
                if (hitCollider(camera.position.x, camera.position.z) || isOutOfBounds(camera.position.x, camera.position.z)) {
                    camera.position.copy(px0); vel.x = 0;
                }

                // Z movement with wall-sliding
                const pz0 = camera.position.clone();
                controls.moveForward(-vel.z * dt);
                if (hitCollider(camera.position.x, camera.position.z) || isOutOfBounds(camera.position.x, camera.position.z)) {
                    camera.position.copy(pz0); vel.z = 0;
                }

                // Head bob
                const bobSpeed = run ? 14 : 8;
                const bobAmt  = run ? 0.055 : 0.032;
                headBobTime += dt * (isMoving ? bobSpeed : 0);
                const targetBob = isMoving ? Math.sin(headBobTime) * bobAmt : 0;
                headBobY += (targetBob - headBobY) * 12 * dt;
                camera.position.y = 1.75 + headBobY;

                // Distance
                const d2 = camera.position.distanceTo(prevPos);
                if (d2 > 0.01) {
                    totalDist += d2;
                    document.getElementById('distance').textContent = totalDist.toFixed(1);
                    prevPos.copy(camera.position);
                }

                // Zone display
                const cx = camera.position.x, cz = camera.position.z;
                let zone = 'Udvar';
                if (cx>-40 && cx<-5 && cz>-9.5 && cz<9.5) zone = 'SMT Gyártócsarnok';
                else if (cx>=-5 && cx<12 && cz>-9.5 && cz<9.5) zone = 'Raktár / BOM Zóna';
                else if (cx>=12 && cx<40 && cz>-9.5 && cz<9.5) zone = 'Irodák / Tárgyaló';
                else if (cx>-3 && cx<3 && cz>=10 && cz<14) zone = 'Főbejárat';
                else if (cx>AB.x-AB.w/2-1 && cx<AB.x+AB.w/2+1 && Math.abs(cz)<AB.d/2+1) zone = 'Melléképület';
                else if (cx < -45 && cx > -75) zone = 'Parkoló';
                document.getElementById('location').textContent = zone;
            }

            // ── WORKER AI ────────────────────────────────────────────────────
            const elapsed = clock.getElapsedTime();
            workers.forEach(w => {
                w.t += dt;

                if (w.state === 'idle') {
                    w.wait -= dt;
                    if (w.wait <= 0) {
                        w.target.copy(randWorkerTarget());
                        w.state = 'walk';
                    }
                    // Idle head bob
                    w.head.rotation.y = Math.sin(w.t * 0.6) * 0.12;
                    w.ll.rotation.x = 0; w.rl.rotation.x = 0;
                    w.la.rotation.x = 0; w.ra.rotation.x = 0;
                } else {
                    const wp = w.group.position;
                    const toTarget = new THREE.Vector3().subVectors(w.target, wp);
                    const dist = toTarget.length();

                    if (dist < 0.15) {
                        w.state = 'idle';
                        w.wait = 1 + Math.random() * 4;
                    } else {
                        toTarget.normalize();
                        wp.addScaledVector(toTarget, Math.min(w.speed * dt, dist));
                        wp.y = 0; // stay on floor

                        // Face direction of movement
                        const angle = Math.atan2(toTarget.x, toTarget.z);
                        let dA = angle - w.group.rotation.y;
                        dA = Math.atan2(Math.sin(dA), Math.cos(dA));
                        w.group.rotation.y += dA * 12 * dt;

                        // Walk cycle
                        const sw = Math.sin(w.t * w.speed * 5.5) * 0.42;
                        w.ll.rotation.x = sw;   w.rl.rotation.x = -sw;
                        w.la.rotation.x = -sw;  w.ra.rotation.x = sw;
                        w.head.rotation.y = Math.sin(w.t * 2) * 0.06;
                    }
                }
            });

            // ── ROBOT ARM ANIMATION ──────────────────────────────────────────
            // Simple sinusoidal for robot arms (push into conveyors[] is removed, we animate by finding children)
            // Already done via scene traversal is too slow; skip per-arm anim for perf

            // ── MINIMAP throttle ─────────────────────────────────────────────
            if (now - lastMM > 80) { drawMM(); lastMM = now; }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
