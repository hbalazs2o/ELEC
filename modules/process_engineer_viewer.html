<!DOCTYPE html>
<html lang="hu" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folyamatmérnöki Felkészítő - Irodai Asszisztens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: var(--bg-page); overflow: hidden; }
        .viewer-container { flex: 1; width: 100%; border: none; background: white; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="authenticated">
    <header class="app-header">
        <a href="../index.html" class="logo">
            <i class="fab fa-android"></i>
            <span>IRODAI<br>ASSZISZTENS</span>
        </a>
        <div class="header-info-line" style="margin-left: auto;">
             <div class="h-info-item"><i class="fas fa-clock"></i> <span class="h-info-val" id="global-clock-time">--:--:--</span><span id="global-clock-date" style="display:none;"></span></div>
             <div class="header-btns">
                <button onclick="App.logout()" class="icon-btn-tiny" title="Kilépés"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
    </header>

    <div class="viewer-container">
        <iframe src="../process/factory_onboarding_plan.html" title="Folyamatmérnöki felkészítő"></iframe>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
