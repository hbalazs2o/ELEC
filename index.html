    <div id="auth-overlay">
        <div class="auth-card">

            </div>
            <button onclick="App.login()" class="auth-btn" style="width: 100%; padding: 0.75rem; background: var(--accent); border: none; border-radius: 8px; color: white; font-weight: 800; text-transform: uppercase; cursor: pointer;">
