<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Kiolvasó - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .ocr-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .ocr-panel {
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #text-res {
            flex: 1;
            padding: 1rem;
            background: transparent;
            color: var(--text-main);
            border: none;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            min-height: 300px;
        }

        .upload-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border-color);
            margin: 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            text-align: center;
            padding: 2rem;
        }

        #pdf-preview {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0 0 1rem 1rem;
        }
    </style>
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>PDF Kiolvasó & OCR</h1>
            <p>Húzzon be egy PDF fájlt a szöveg kinyeréséhez.</p>

            <div class="ocr-layout">
                <div class="ocr-panel">
                    <div class="panel-header">ELŐNÉZET</div>
                    <div id="pdf-container" style="flex: 1; display: flex;">
                        <label class="upload-zone" id="drop-zone">
                            <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                            <p>Kattintson vagy húzza ide a PDF-et</p>
                            <input type="file" id="pdf-input" accept="application/pdf" hidden>
                        </label>
                        <iframe id="pdf-preview" style="display:none;"></iframe>
                    </div>
                </div>

                <div class="ocr-panel">
                    <div class="panel-header">
                        KIOLVASOTT SZÖVEG
                        <button class="btn-text" onclick="copyText()">Másolás <i class="fas fa-copy"></i></button>
                    </div>
                    <textarea id="text-res" placeholder="A szöveg itt fog megjelenni..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const input = document.getElementById('pdf-input');
        const preview = document.getElementById('pdf-preview');
        const textRes = document.getElementById('text-res');
        const zone = document.getElementById('drop-zone');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        input.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            zone.style.display = 'none';
            preview.style.display = 'block';
            preview.src = URL.createObjectURL(file);

            textRes.value = "Kiolvasás folyamatban...";

            const reader = new FileReader();
            reader.onload = async function () {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    let pageText = content.items.map(item => item.str).join(' ');

                    if (pageText.trim().length < 10) {
                        textRes.value = `Szöveg nem található a(z) ${i}. oldalon, OCR indítása...`;
                        const canvas = document.createElement('canvas');
                        const viewport = page.getViewport({ scale: 2 });
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        const canvasContext = canvas.getContext('2d');

                        await page.render({ canvasContext, viewport }).promise;

                        const result = await Tesseract.recognize(canvas, 'hun', {
                            logger: m => {
                                if (m.status === 'recognizing text') {
                                    textRes.value = `OCR folyamatban (${i}/${pdf.numPages}): ${Math.round(m.progress * 100)}%`;
                                }
                            }
                        });
                        pageText = result.data.text;
                    }

                    fullText += `--- ${i}. OLDAL ---\n` + pageText + "\n\n";
                    textRes.value = fullText;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function copyText() {
            textRes.select();
            document.execCommand('copy');
            alert("Szöveg a vágólapra másolva!");
        }
    </script>
</body>

</html>
