<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időjárás - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>Helyi Időjárás (Nagyatád)</h1>
            
            <div style="margin: 2rem 0;">
                <p><strong>Hőmérséklet:</strong> <span id="weather-temp">--°C</span></p>
                <p><strong>Szélsebesség:</strong> <span id="weather-wind">-- km/h</span></p>
                <p><strong>Páratartalom:</strong> <span id="weather-humid">--%</span></p>
                <p><strong>Légnyomás:</strong> <span id="weather-press">-- hPa</span></p>
            </div>

            <p>Az adatok automatikusan frissülnek a központi rendszerből.</p>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
