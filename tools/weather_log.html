<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időjárás Napló - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .weather-grid {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .chart-container {
            height: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .meta-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .meta-box {
            padding: 1.5rem;
            background: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            text-align: center;
        }
    </style>
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>Időjárás Napló</h1>
            <p>Havi középhőmérsékleti átlagok és napfénytartam adatok.</p>

            <div class="weather-grid">
                <div class="chart-container">
                    <h3>Napi Középhőmérséklet (30 napos trend)</h3>
                    <canvas id="trendChart"></canvas>
                </div>

                <div class="meta-info">
                    <div class="meta-box">
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Legalacsonyabb átlag</p>
                        <p style="font-size: 1.25rem; font-weight: 800;">-0.5°C (JAN)</p>
                    </div>
                    <div class="meta-box">
                        <p style="font-size: 0.8rem; color: var(--text-muted);">30 napos átlag</p>
                        <p id="trend-avg-display" style="font-size: 1.25rem; font-weight: 800; color: var(--primary);">--°C</p>
                    </div>
                    <div class="meta-box">
                        <p style="font-size: 0.8rem; color: var(--text-muted);">Legmagasabb átlag</p>
                        <p style="font-size: 1.25rem; font-weight: 800;">21.8°C (AUG)</p>
                    </div>
                </div>

                <div class="chart-container">
                    <h3>Havi Napfénytartam (óra)</h3>
                    <canvas id="sunshineChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const months = ['Jan', 'Feb', 'Már', 'Ápr', 'Máj', 'Jún', 'Júl', 'Aug', 'Szept', 'Okt', 'Nov', 'Dec'];
        
        async function initTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            let trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Hőmérséklet (°C)',
                        data: [],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=46.3594&longitude=17.7961&past_days=31&daily=temperature_2m_mean&timezone=Europe%2FBudapest&forecast_days=0');
                const data = await res.json();
                if (data && data.daily) {
                    trendChart.data.labels = data.daily.time.map(d => d.split('-').slice(1).join('.'));
                    trendChart.data.datasets[0].data = data.daily.temperature_2m_mean;
                    trendChart.update();
                    const avg = data.daily.temperature_2m_mean.reduce((a, b) => a + b, 0) / data.daily.temperature_2m_mean.length;
                    document.getElementById('trend-avg-display').innerText = avg.toFixed(1) + "°C";
                }
            } catch (e) { console.error(e); }
        }

        const sunHours = [58, 91, 135, 177, 230, 237, 246, 235, 185, 147, 69, 50];
        new Chart(document.getElementById('sunshineChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: months,
                datasets: [{
                    label: 'Óra',
                    data: sunHours,
                    backgroundColor: 'rgba(245, 158, 11, 0.6)',
                    borderRadius: 5
                }]
            },
            options: {
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });

        initTrendChart();
    </script>
</body>

</html>
