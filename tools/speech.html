<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szöveg Felolvasó - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .speech-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .text-input-area {
            width: 100%;
            height: 300px;
            padding: 1rem;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-item label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .styled-select, .styled-range {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
        }

        .action-btns {
            display: flex;
            gap: 1rem;
        }
    </style>
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>Szöveg Felolvasó (TTS)</h1>
            <p>Másolja ide a felolvasni kívánt szöveget.</p>

            <div class="speech-container">
                <textarea id="text-to-read" class="text-input-area" placeholder="Szöveg helye..."></textarea>

                <div class="controls-grid">
                    <div class="control-item">
                        <label>Hang</label>
                        <select id="voice-select" class="styled-select">
                            <option value="">Hangok betöltése...</option>
                        </select>
                    </div>
                    <div class="control-item">
                        <label>Sebesség (<span id="rate-val">1.0</span>x)</label>
                        <input type="range" id="rate-select" class="styled-range" min="0.5" max="2" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="action-btns">
                    <button id="play-btn" class="btn-text"><i class="fas fa-play"></i> Lejátszás</button>
                    <button id="stop-btn" class="btn-text"><i class="fas fa-stop"></i> Megállítás</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const synth = window.speechSynthesis;
        const textInput = document.getElementById('text-to-read');
        const voiceSelect = document.getElementById('voice-select');
        const rateSelect = document.getElementById('rate-select');
        const rateVal = document.getElementById('rate-val');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');

        let voices = [];

        function populateVoiceList() {
            voices = synth.getVoices();
            if (voices.length === 0) return;

            voices.sort((a, b) => a.name.localeCompare(b.name));

            const currentSelection = voiceSelect.value;
            voiceSelect.innerHTML = '';

            const huVoices = voices.filter(v => v.lang.includes('hu'));

            (huVoices.length > 0 ? huVoices : voices).forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });

            if (currentSelection) voiceSelect.value = currentSelection;
            else if (huVoices.length > 0) voiceSelect.value = huVoices[0].name;
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        rateSelect.oninput = () => { rateVal.innerText = rateSelect.value; };

        playBtn.onclick = () => {
            if (synth.speaking) synth.cancel();
            if (textInput.value !== '') {
                const utterThis = new SpeechSynthesisUtterance(textInput.value);
                const selectedVoiceName = voiceSelect.value;
                const voice = voices.find(v => v.name === selectedVoiceName);
                if (voice) utterThis.voice = voice;
                utterThis.rate = rateSelect.value;
                
                utterThis.onstart = () => playBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Olvasás...';
                utterThis.onend = () => playBtn.innerHTML = '<i class="fas fa-play"></i> Lejátszás';
                
                synth.speak(utterThis);
            }
        };

        stopBtn.onclick = () => {
            synth.cancel();
            playBtn.innerHTML = '<i class="fas fa-play"></i> Lejátszás';
        };
    </script>
</body>

</html>
