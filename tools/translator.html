<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligens Fordító - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .translator-layout {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 1rem;
            align-items: center;
        }

        .lang-select {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
        }

        .text-areas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .transcript-area, .output-area {
            width: 100%;
            min-height: 200px;
            padding: 1rem;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
        }

        .output-area {
            background: transparent;
            border-style: dashed;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
    </style>
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>Intelligens Fordító</h1>
            <p>Fordítson szövegeket több nyelvre valós időben.</p>

            <div class="translator-layout">
                <div class="lang-grid">
                    <select id="src-lang" class="lang-select">
                        <option value="hu-HU">Magyar</option>
                        <option value="en-US">Angol</option>
                        <option value="de-DE">Német</option>
                    </select>
                    <button class="btn-text" onclick="swapLangs()"><i class="fas fa-exchange-alt"></i></button>
                    <select id="target-lang" class="lang-select">
                        <option value="en-US" selected>Angol</option>
                        <option value="hu-HU">Magyar</option>
                        <option value="de-DE">Német</option>
                    </select>
                </div>

                <div class="text-areas">
                    <textarea class="transcript-area" id="src-text" placeholder="Írja ide a forrás szöveget..." oninput="autoTranslate()"></textarea>
                    <div class="output-area" id="target-text">A fordítás helye...</div>
                </div>

                <div class="controls">
                    <button id="record-btn" class="btn-text" onclick="toggleRecording()"><i class="fas fa-microphone"></i> Beszéd</button>
                    <button id="play-btn" class="btn-text" onclick="playTranslation()" disabled><i class="fas fa-volume-up"></i> Lejátszás</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        let isRecording = false;
        let lastTranslation = "";
        let translateTimeout;
        const synth = window.speechSynthesis;

        recognition.interimResults = true;

        recognition.onstart = () => {
            isRecording = true;
            document.getElementById('record-btn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Figyelés...';
        };

        recognition.onend = () => {
            isRecording = false;
            document.getElementById('record-btn').innerHTML = '<i class="fas fa-microphone"></i> Beszéd';
            translateText();
        };

        recognition.onresult = (event) => {
            let final = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) final += event.results[i][0].transcript;
            }
            if (final) document.getElementById('src-text').value = final;
        };

        function toggleRecording() {
            if (isRecording) recognition.stop();
            else {
                recognition.lang = document.getElementById('src-lang').value;
                recognition.start();
            }
        }

        function autoTranslate() {
            clearTimeout(translateTimeout);
            translateTimeout = setTimeout(translateText, 800);
        }

        async function translateText() {
            const text = document.getElementById('src-text').value.trim();
            const targetDisplay = document.getElementById('target-text');
            if (!text) {
                targetDisplay.innerText = "A fordítás helye...";
                document.getElementById('play-btn').disabled = true;
                return;
            }

            const sl = document.getElementById('src-lang').value.split('-')[0];
            const tl = document.getElementById('target-lang').value.split('-')[0];

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURI(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                lastTranslation = data[0].map(x => x[0]).join('');
                targetDisplay.innerText = lastTranslation;
                document.getElementById('play-btn').disabled = false;
            } catch (e) {
                targetDisplay.innerText = "Hiba történt a fordítás során.";
            }
        }

        function playTranslation() {
            if (!lastTranslation) return;
            synth.cancel();
            const utterThis = new SpeechSynthesisUtterance(lastTranslation);
            utterThis.lang = document.getElementById('target-lang').value;
            synth.speak(utterThis);
        }

        function swapLangs() {
            const src = document.getElementById('src-lang');
            const target = document.getElementById('target-lang');
            const tmp = src.value;
            src.value = target.value;
            target.value = tmp;
            translateText();
        }
    </script>
</body>

</html>
