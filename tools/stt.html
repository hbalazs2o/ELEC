<!DOCTYPE html>
<html lang="hu" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangfelismerő - ELEC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .stt-container {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .recognition-box {
            width: 100%;
            min-height: 250px;
            padding: 1.5rem;
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            font-size: 1.2rem;
            line-height: 1.6;
            text-align: left;
        }

        .btn-mic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: transparent;
            color: var(--text-main);
            font-size: 2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-mic.listening {
            border-color: #ff4b2b;
            color: #ff4b2b;
            box-shadow: 0 0 15px rgba(255, 75, 43, 0.3);
        }

        .action-btns {
            display: flex;
            gap: 1rem;
        }
    </style>
</head>

<body class="module-body">
    <!-- Unified Header injected by header.js -->

    <div class="module-container">
        <div class="module-content-wrapper">
            <h1>Hangfelismerő (STT)</h1>
            <p>Alakítsa beszédet szöveggé valós időben.</p>

            <div class="stt-container">
                <div id="status" style="font-size: 0.8rem; font-weight: 800; color: var(--text-muted);">
                    ÁLLAPOT: VÁRAKOZÁS...
                </div>

                <div id="output" class="recognition-box">
                    Kattintson a mikrofonra és kezdjen el beszélni...
                </div>

                <button id="mic-btn" class="btn-mic">
                    <i class="fas fa-microphone"></i>
                </button>

                <div class="action-btns">
                    <button onclick="copyText()" class="btn-text">Másolás <i class="fas fa-copy"></i></button>
                    <button onclick="clearText()" class="btn-text">Törlés <i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/header.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const micBtn = document.getElementById('mic-btn');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let recognition;
        let isListening = false;

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'hu-HU';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                status.innerText = 'ÁLLAPOT: FIGYELÉS...';
                if (output.innerText.includes('Kattintson a mikrofonra')) output.innerText = '';
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalCurrent = '';
                for (let i = 0; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalCurrent += event.results[i][0].transcript + ' ';
                    else interimTranscript += event.results[i][0].transcript;
                }
                output.innerHTML = finalCurrent + '<span style="opacity: 0.5;">' + interimTranscript + '</span>';
            };

            recognition.onerror = () => stopListening();
            recognition.onend = () => { if (isListening) recognition.start(); };
        } else {
            output.innerText = "Sajnos a böngészője nem támogatja a hangfelismerést.";
            micBtn.disabled = true;
        }

        micBtn.onclick = () => isListening ? stopListening() : startListening();

        function startListening() { recognition.start(); }
        function stopListening() {
            isListening = false;
            recognition.stop();
            micBtn.classList.remove('listening');
            status.innerText = 'ÁLLAPOT: VÁRAKOZÁS...';
        }

        function copyText() {
            navigator.clipboard.writeText(output.innerText).then(() => alert('Szöveg a vágólapra másolva!'));
        }

        function clearText() {
            output.innerText = 'Kattintson a mikrofonra és kezdjen el beszélni...';
            if (isListening) stopListening();
        }
    </script>
</body>

</html>
